{% extends "base.html" %}
{% block title %}Create Schedule - SocialSense AI{% endblock %}
{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-6">
        <div class="card border-secondary"><div class="card-body p-4">
            <h4 class="fw-bold mb-4"><i class="fas fa-calendar-plus me-2 text-primary"></i>Create Schedule</h4>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Platform</label>
                    <select name="platform" class="form-select">
                        <option value="youtube">YouTube</option>
                        <option value="reddit">Reddit</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Source Input (URL or ID)</label>
                    <input type="text" name="source_input" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Frequency</label>
                    <select name="frequency" class="form-select">
                        <option value="once">Once</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Comment Limit</label>
                    <select name="comment_limit" class="form-select">
                        <option value="100">100</option>
                        <option value="500">500</option>
                        <option value="1000">1000</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-1"></i>Create Schedule</button>
            </form>
        </div></div>
    </div>
</div>
{% endblock %}
