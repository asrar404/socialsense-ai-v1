{% extends "base.html" %}
{% block title %}Edit Schedule - SocialSense AI{% endblock %}
{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-6">
        <div class="card border-secondary"><div class="card-body p-4">
            <h4 class="fw-bold mb-4"><i class="fas fa-edit me-2 text-primary"></i>Edit Schedule</h4>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Source Input</label>
                    <input type="text" name="source_input" class="form-control" value="{{ schedule.source_input }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Frequency</label>
                    <select name="frequency" class="form-select">
                        <option value="once" {{ 'selected' if schedule.frequency == 'once' }}>Once</option>
                        <option value="daily" {{ 'selected' if schedule.frequency == 'daily' }}>Daily</option>
                        <option value="weekly" {{ 'selected' if schedule.frequency == 'weekly' }}>Weekly</option>
                        <option value="monthly" {{ 'selected' if schedule.frequency == 'monthly' }}>Monthly</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Comment Limit</label>
                    <select name="comment_limit" class="form-select">
                        <option value="100" {{ 'selected' if schedule.comment_limit == 100 }}>100</option>
                        <option value="500" {{ 'selected' if schedule.comment_limit == 500 }}>500</option>
                        <option value="1000" {{ 'selected' if schedule.comment_limit == 1000 }}>1000</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Save</button>
                <a href="{{ url_for('schedules.list_schedules') }}" class="btn btn-outline-secondary"><i class="fas fa-times me-1"></i>Cancel</a>
            </form>
        </div></div>
    </div>
</div>
{% endblock %}
